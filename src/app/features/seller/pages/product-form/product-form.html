<mat-card>
  <h2>{{ productId ? 'Edit Product' : 'Add Product' }}</h2>
  <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
    <mat-form-field appearance="outline"><mat-label>Name</mat-label><input matInput formControlName="name" /></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Price</mat-label><input matInput type="number" formControlName="price" /></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Category</mat-label>
      <mat-select formControlName="category">
        @for (category of categories; track category) {
          <mat-option [value]="category">{{ category }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full"><mat-label>Description</mat-label><textarea matInput formControlName="description"></textarea></mat-form-field>

    <div class="full">
      <label>Product Image</label>
      <input type="file" accept="image/*" (change)="onFileSelected($event)" />
      @if (imagePreview) {
        <img class="preview" [src]="imagePreview" alt="preview" />
      }
    </div>

    <div class="full actions">
      <button mat-flat-button type="submit">Save Product</button>
      @if (productId) {
        <button mat-button color="warn" type="button" (click)="deleteProduct()">Delete</button>
      }
    </div>
  </form>
</mat-card>
