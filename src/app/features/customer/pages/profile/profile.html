<section class="profile-page">
  <div class="heading-row">
    <h2>My Profile</h2>
    <p>Update your details and profile photo</p>
  </div>

  <div class="profile-layout">
    <article class="photo-card">
      <div class="avatar-wrap">
        @if (previewPhotoUrl) {
          <img [src]="previewPhotoUrl" alt="Profile photo" />
        } @else {
          <div class="avatar-placeholder">No Photo</div>
        }
      </div>

      <label class="upload-btn" for="profilePhotoInput">Upload Photo</label>
      <input
        id="profilePhotoInput"
        type="file"
        accept="image/*"
        (change)="onPhotoSelected($event)"
      />
      <p class="file-name">{{ selectedPhotoName }}</p>
      <p class="file-name">You can upload an image or use local assets path (example: assets/Login.png)</p>
    </article>

    <article class="form-card">
      <form [formGroup]="form" (ngSubmit)="saveProfile()">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" formControlName="email" readonly />
        </div>

        <div class="field">
          <label for="displayName">Full Name</label>
          <input id="displayName" type="text" formControlName="displayName" placeholder="Enter your name" />
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input id="phone" type="tel" formControlName="phone" placeholder="Enter phone number" />
        </div>

        <div class="field">
          <label for="photoURL">Photo URL</label>
          <input id="photoURL" type="text" formControlName="photoURL" placeholder="assets/Login.png" (input)="onPhotoUrlChange($any($event.target).value)" />
        </div>

        <button type="submit">Save Profile</button>
      </form>
    </article>
  </div>
</section>
