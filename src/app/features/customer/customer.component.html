<div class="customer-shell">
	<aside class="sidebar" aria-label="Customer navigation">
		<div class="brand">ShopHub</div>
		<p class="subtitle">Customer Panel</p>

		<nav>
			<a routerLink="/customer/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
			<a routerLink="/customer/products" routerLinkActive="active">Products</a>
			<a routerLink="/customer/profile" routerLinkActive="active">Profile</a>
			<a routerLink="/customer/cart" routerLinkActive="active">Cart</a>
			<a routerLink="/customer/wishlist" routerLinkActive="active">Wishlist</a>
			<a routerLink="/customer/orders" routerLinkActive="active">Orders</a>
			<a routerLink="/customer/checkout" routerLinkActive="active">Checkout</a>
		</nav>
	</aside>

	<section class="content-wrap">
		<header class="content-header">
			<div class="filters-strip">
				<div class="search-control">
					<label class="ghost-label" for="header-search">Search</label>
					<div class="search-shell">
						<span class="search-icon" aria-hidden="true">🔎</span>
						<input
							id="header-search"
							type="text"
							[(ngModel)]="searchText"
							(input)="onSearchChange()"
							placeholder="Search products"
						/>
					</div>
				</div>

				<div class="filter-control">
					<label for="header-category">Category</label>
					<select id="header-category" [(ngModel)]="selectedCategory" (change)="onCategoryChange(selectedCategory)">
						@for (category of categories; track category) {
							<option [value]="category">{{ category }}</option>
						}
					</select>
				</div>

				<div class="filter-control">
					<label for="header-sort">Sort by</label>
					<select id="header-sort" [(ngModel)]="selectedSort" (change)="onSortChange(selectedSort)">
						<option value="latest">Latest</option>
						<option value="priceAsc">Price: Low to High</option>
						<option value="priceDesc">Price: High to Low</option>
					</select>
				</div>
			</div>

			<div class="header-actions">
				<div class="user-chip" *ngIf="userBadge$ | async as userBadge">
					<span class="user-avatar" aria-hidden="true">{{ userBadge.initial }}</span>
					<span class="user-name">Hi, {{ userBadge.name }}</span>
				</div>
				<button type="button" class="logout-btn" (click)="logout()">Logout</button>
			</div>
		</header>

		<main class="content-body">
			<router-outlet></router-outlet>
		</main>
	</section>
</div>
