server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-before-deploy-32chars-min}
    expiration-ms: 3600000

  migration:
    enabled: false

logging:
  level:
    org.hibernate.SQL: INFO

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}

---
# Test profile - PostgreSQL only
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://${TEST_DB_HOST:${DB_HOST:localhost}}:${TEST_DB_PORT:${DB_PORT:5432}}/${TEST_DB_NAME:ecommerce_test}
    driver-class-name: org.postgresql.Driver
    username: ${TEST_DB_USER:${DB_USER:postgres}}
    password: ${TEST_DB_PASSWORD:${DB_PASSWORD:postgres}}
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET:test-secret-change-before-deploy-32chars-min}
